name: Housekeeping

on:
  schedule:
    - cron: "30 2 * * 0"
  workflow_dispatch:

concurrency:
  group: housekeeping-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prune-runtime-history:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AINEWS_DATABASE_URL: ${{ vars.AINEWS_DATABASE_URL }}
      AINEWS_SOURCE_RUNTIME_RETENTION_DAYS: ${{ vars.AINEWS_SOURCE_RUNTIME_RETENTION_DAYS }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Prune archived source runtime history
        run: |
          RETENTION_DAYS="${AINEWS_SOURCE_RUNTIME_RETENTION_DAYS:-45}"
          python -m ainews prune-source-runtime-history --retention-days "$RETENTION_DAYS"
