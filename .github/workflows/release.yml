name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  attestations: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check src tests

      - name: Run coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Enforce coverage threshold
        run: python -m coverage report

      - name: Build package
        run: python -m build

      - name: Generate artifact checksums
        run: sha256sum dist/* > dist/sha256sums.txt

      - name: Generate SBOM
        run: |
          PYTHON_BIN="$(python -c 'import sys; print(sys.executable)')"
          python -m cyclonedx_py environment "${PYTHON_BIN}" \
            --pyproject pyproject.toml \
            --mc-type application \
            --output-reproducible \
            --of JSON \
            -o "dist/${GITHUB_REF_NAME}-sbom.json"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/*

      - name: Prepare release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/releases/${TAG}.md"
          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" /tmp/release-notes.md
          else
            printf 'Release %s\n' "${TAG}" > /tmp/release-notes.md
          fi

      - name: Publish GitHub release
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
            gh release edit "${TAG}" --title "${TAG}" --notes-file /tmp/release-notes.md
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --notes-file /tmp/release-notes.md
          fi

      - name: Trigger release artifact smoke
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh workflow run release-artifact-smoke.yml --ref main -f tag="${TAG}"
