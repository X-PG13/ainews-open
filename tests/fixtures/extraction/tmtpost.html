      <h1>AI 安全公司发布新代理防护平台</h1>
      <div class="article-meta">
        作者：李明
        来源：钛媒体
      </div>
      <p>一家 AI 原生安全公司今天发布了新的代理防护平台，面向企业内部知识库、客服流程和自动化运维场景提供统一的审计与拦截能力。</p>
      <p>该平台可以识别提示词注入、越权检索和高风险工具调用，并将模型执行链路回放给安全团队，帮助企业建立可解释、可追责的 AI 工作流。</p>
      <p>厂商表示，随着越来越多团队把代理系统接到真实业务上，AI 安全不再只是模型问题，而是发布、权限、监控和响应一体化的工程问题。</p>
